services:
  app:
    container_name: fsre-sync
    image: fsre-sync:latest
    build: .
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "${PORT:-5000}:5000"
    env_file:
      - .env
    environment:
      PORT: 5000
      SQLITE_PATH: /app/data/fsre-sync.db
      GOOGLE_APPLICATION_CREDENTIALS: /app/service_account_key.json
    healthcheck:
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5000/health"]
    volumes:
      - ./data:/app/data
      - ./service_account_key.json:/app/service_account_key.json:ro
    networks:
      - nginx-proxy
      - fsre_sync_default

networks:
  nginx-proxy:
    external: true
  fsre_sync_default:
    driver: bridge
